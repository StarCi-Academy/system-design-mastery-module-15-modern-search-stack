name: m15-l0-inverted-index-and-bm25

services:
  redis:
    image: redis:7-alpine
    container_name: m15l0-redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  bm25-search-service:
    image: starciacademy/system-design-inverted-index-and-bm25-from-scratch-bm25-search-service:latest
    container_name: m15l0-bm25-search-service
    ports:
      - "3019:3019"
    environment:
      PORT: 3019
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
